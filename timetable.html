<html>
    <head>
        <style>
            .timetable {
                width: 100%;
                border-collapse: collapse;
                font-family: Arial, sans-serif;
            }
            .timetable th,
            .timetable td {
                border: 1px solid #ddd;
                padding: 8px;
                text-align: center;
            }
            .timetable th {
                background-color: #4caf50;
                color: white;
            }
            .timetable tr:nth-child(even) {
                background-color: #f9f9f9;
            }
            .timetable tr:hover {
                background-color: #f1f1f1;
            }
        </style>
        <title>My College Timetable</title>
    </head>
    <body>
        <table border="1" class="timetable">
            <tr style="text-align: center; background-color: #f2f2f2">
                <th>Day</th>
                <th>1</th>
                <th>2</th>
                <th>3</th>
                <th>4</th>
                <th>5</th>
                <th>6</th>
                <th>7</th>
                <th>8</th>
            </tr>
            <tr>
                <td>Mon</td>
                <td>DSA</td>
                <td>DSA</td>
                <td>GLB</td>
                <td>GLB</td>
                <td>JAP</td>
                <td>JAP</td>
                <td>CFAI</td>
                <td>CFAI</td>
            </tr>
            <tr>
                <td>Tue</td>
                <td>DSA</td>
                <td>DSA</td>
                <td>-</td>
                <td>-</td>
                <td>GLB</td>
                <td>GLB</td>
                <td>FED</td>
                <td>FED</td>
            </tr>
            <tr>
                <td>Wed</td>
                <td>MFCS</td>
                <td>MFCS</td>
                <td>-</td>
                <td>-</td>
                <td>DSA</td>
                <td>DSA</td>
                <td>-</td>
                <td>-</td>
            </tr>
            <tr>
                <td>Thu</td>
                <td>FED</td>
                <td>FED</td>
                <td>MFCS</td>
                <td>MFCS</td>
                <td>CFAI</td>
                <td>CFAI</td>
                <td>-</td>
                <td>-</td>
            </tr>
            <tr>
                <td>Fri</td>
                <td>JAP</td>
                <td>JAP</td>
                <td>FED</td>
                <td>FED</td>
                <td>DSA</td>
                <td>DSA</td>
                <td>MFCS</td>
                <td>MFCS</td>
            </tr>
            <tr>
                <td>Sat</td>
                <td>FED</td>
                <td>FED</td>
                <td>CFAI</td>
                <td>CFAI</td>
                <td>DSA</td>
                <td>DSA</td>
                <td>CFAI</td>
                <td>CFAI</td>
            </tr>
        </table>
    </body>
</html>
